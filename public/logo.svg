<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#2D2D44"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F47920"/>
      <stop offset="100%" style="stop-color:#FF8C42"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="250" cy="250" r="230" fill="url(#bgGrad)"/>
  <circle cx="250" cy="250" r="220" fill="none" stroke="#F47920" stroke-width="2" opacity="0.3"/>
  <circle cx="250" cy="250" r="235" fill="none" stroke="#F47920" stroke-width="1" opacity="0.15"/>

  <!-- House outline -->
  <g transform="translate(250,195)">
    <!-- Roof -->
    <polygon points="-100,-20 0,-100 100,-20" fill="none" stroke="#F47920" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Chimney -->
    <rect x="50" y="-80" width="28" height="50" fill="none" stroke="#F47920" stroke-width="6" stroke-linecap="round" rx="2"/>
    <!-- Walls -->
    <rect x="-100" y="-20" width="200" height="150" fill="none" stroke="#F47920" stroke-width="8" stroke-linejoin="round" rx="2"/>
    <!-- Door -->
    <rect x="-20" y="50" width="50" height="80" fill="none" stroke="#F47920" stroke-width="5" rx="3"/>
    <circle cx="20" cy="90" r="4" fill="#F47920"/>
    <!-- Windows -->
    <rect x="-80" y="20" width="40" height="40" fill="none" stroke="#F47920" stroke-width="4" rx="2"/>
    <line x1="-60" y1="20" x2="-60" y2="60" stroke="#F47920" stroke-width="3"/>
    <line x1="-80" y1="40" x2="-40" y2="40" stroke="#F47920" stroke-width="3"/>
    <rect x="45" y="20" width="40" height="40" fill="none" stroke="#F47920" stroke-width="4" rx="2"/>
    <line x1="65" y1="20" x2="65" y2="60" stroke="#F47920" stroke-width="3"/>
    <line x1="45" y1="40" x2="85" y2="40" stroke="#F47920" stroke-width="3"/>
  </g>

  <!-- QR pattern dots (bottom right area) -->
  <g transform="translate(320,310)">
    <rect x="0" y="0" width="12" height="12" fill="#F47920" rx="2"/>
    <rect x="16" y="0" width="12" height="12" fill="#F47920" rx="2"/>
    <rect x="32" y="0" width="12" height="12" fill="#F47920" rx="2"/>
    <rect x="0" y="16" width="12" height="12" fill="#F47920" rx="2"/>
    <rect x="16" y="16" width="12" height="12" fill="#0F0F23" rx="2"/>
    <rect x="0" y="32" width="12" height="12" fill="#F47920" rx="2"/>
    <rect x="32" y="16" width="12" height="12" fill="#F47920" rx="2"/>
    <rect x="16" y="32" width="12" height="12" fill="#F47920" rx="2"/>
    <rect x="32" y="32" width="12" height="12" fill="#F47920" rx="2"/>
  </g>

  <!-- Text: BUD -->
  <text x="250" y="370" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="64" fill="white" letter-spacing="8">BUD</text>

  <!-- Text: QR -->
  <text x="250" y="450" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="200" font-size="28" fill="#F47920" letter-spacing="16">QR</text>

  <!-- Bottom accent line -->
  <line x1="170" y1="465" x2="330" y2="465" stroke="#F47920" stroke-width="2" opacity="0.6"/>
</svg>
