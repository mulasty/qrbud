<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" width="300" height="60">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F47920"/>
      <stop offset="100%" style="stop-color:#FF8C42"/>
    </linearGradient>
  </defs>

  <!-- House icon -->
  <g transform="translate(35,30)">
    <polygon points="-18,0 0,-22 18,0" fill="none" stroke="#F47920" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="5" y="-14" width="8" height="12" fill="none" stroke="#F47920" stroke-width="2" rx="1"/>
    <rect x="-20" y="0" width="40" height="28" fill="none" stroke="#F47920" stroke-width="3.5" rx="2"/>
    <rect x="-4" y="10" width="10" height="18" fill="none" stroke="#F47920" stroke-width="2" rx="2"/>
    <circle cx="4" cy="19" r="1.5" fill="#F47920"/>
  </g>

  <!-- Text -->
  <text x="80" y="26" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="22" fill="#1A1A2E" letter-spacing="1">QR BUD</text>
  <text x="80" y="44" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="11" fill="#666" letter-spacing="4">MIKOŁAJ TCHÓRZEWSKI</text>

  <!-- Divider -->
  <line x1="225" y1="12" x2="225" y2="48" stroke="#E0E0E0" stroke-width="1"/>

  <!-- QR code dots -->
  <g transform="translate(245,14)">
    <rect x="0" y="0" width="6" height="6" fill="#F47920" rx="1"/>
    <rect x="8" y="0" width="6" height="6" fill="#F47920" rx="1"/>
    <rect x="0" y="8" width="6" height="6" fill="#F47920" rx="1"/>
    <rect x="8" y="8" width="6" height="6" fill="#1A1A2E" rx="1"/>
    <rect x="0" y="16" width="6" height="6" fill="#F47920" rx="1"/>
    <rect x="16" y="0" width="6" height="6" fill="#F47920" rx="1"/>
    <rect x="16" y="8" width="6" height="6" fill="#F47920" rx="1"/>
    <rect x="8" y="16" width="6" height="6" fill="#F47920" rx="1"/>
    <rect x="16" y="16" width="6" height="6" fill="#F47920" rx="1"/>
  </g>
</svg>
